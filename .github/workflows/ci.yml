name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y curl libjemalloc2 libvips libexif-dev libcurl4-openssl-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y curl libjemalloc2 libvips libexif-dev libcurl4-openssl-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y curl libjemalloc2 libvips libexif-dev libcurl4-openssl-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: redis
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips libexif-dev libcurl4-openssl-dev postgresql-client

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  dev-deploy:
    name: Deploy to DEV environment

    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    needs:
      - scan_ruby
      - scan_js
      - lint
      - test

    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Kamal gem
        run: |
          KAMAL_VERSION=$(ruby -rbundler -e "puts Bundler.locked_gems.specs.find { |s| s.name == 'kamal' }&.version")
          gem install kamal -v $KAMAL_VERSION

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_DEPLOY_KEY }}

      - name: Run deploy command
        env:
          KAMAL_REGISTRY_USERNAME: ${{ secrets.KAMAL_REGISTRY_USERNAME }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONNECTOR__ZAMMAD_API_TOKEN: ${{ secrets.CONNECTOR__ZAMMAD_API_TOKEN }}
          CONNECTOR__ZAMMAD_WEBHOOK_SECRET: ${{ secrets.CONNECTOR__ZAMMAD_WEBHOOK_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEGACY_DB_URL: ${{ secrets.LEGACY_DB_URL }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TRIAGE_ZAMMAD_API_TOKEN: ${{ secrets.TRIAGE_ZAMMAD_API_TOKEN }}
          TRIAGE_ZAMMAD_WEBHOOK_SECRET: ${{ secrets.TRIAGE_ZAMMAD_WEBHOOK_SECRET }}
          DEFAULT_USER_EMAIL: ${{ vars.DEFAULT_USER_EMAIL }}
          DEFAULT_USER_FIRSTNAME: ${{ vars.DEFAULT_USER_FIRSTNAME }}
          DEFAULT_USER_LASTNAME: ${{ vars.DEFAULT_USER_LASTNAME }}
          DEFAULT_USER_ZAMMAD_IDENTIFIER: ${{ vars.DEFAULT_USER_ZAMMAD_IDENTIFIER }}
          LEGACY_PORTAL_URL: ${{ vars.LEGACY_PORTAL_URL }}
          CONNECTOR__OPS_API_URL: ${{ vars.CONNECTOR__OPS_API_URL }}
          CONNECTOR_WEBHOOK_URL: ${{ vars.CONNECTOR_WEBHOOK_URL }}
          CONNECTOR__ZAMMAD_URL: ${{ vars.CONNECTOR__ZAMMAD_URL }}
          TRIAGE_ZAMMAD_URL: ${{ vars.TRIAGE_ZAMMAD_URL }}      

        run: kamal deploy -d staging
